<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENCCO — Panel Administrativo</title>
  <link rel="canonical" href="https://encco.dgp-link.com/admin/" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#ff8000" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #ff8000;
      --orange-dim: rgba(255,128,0,0.15);
      --black: #000;
      --surface: #0f0f0f;
      --surface2: #1a1a1a;
      --surface3: #242424;
      --border: #2a2a2a;
      --text: #fff;
      --text-muted: #888;
      --text-dim: #555;
      --sidebar-w: 220px;
    }
    html, body { height: 100%; background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, textarea, select { font-family: inherit; }
    img { max-width: 100%; display: block; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--black); padding: 20px;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 28px;
    }
    .login-logo { width: 120px; margin: 0 auto 20px; }
    .login-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; text-align: center; margin-bottom: 4px; }
    .login-sub { color: var(--text-muted); font-size: 13px; text-align: center; margin-bottom: 28px; }
    .login-field { margin-bottom: 14px; }
    .login-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .login-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; color: #fff; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--orange); }
    .login-input.error { border-color: #ff4444; }
    .pw-wrap { position: relative; }
    .pw-wrap .login-input { padding-right: 44px; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 2px; }
    .login-error { color: #ff4444; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
    .login-error.show { display: block; }
    .btn-login {
      width: 100%; background: var(--orange); color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      padding: 13px; border-radius: 8px; border: none; cursor: pointer;
      transition: opacity 0.2s; margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* DASHBOARD */
    #dashboard { display: none; min-height: 100vh; }
    #dashboard.visible { display: flex; }

    /* SIDEBAR */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; min-height: 100vh;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo-wrap { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo { height: 32px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border: none; background: none;
      transition: all 0.2s; width: 100%; text-align: left; position: relative;
    }
    .sidebar-btn:hover { background: var(--surface2); color: #fff; }
    .sidebar-btn.active { background: var(--orange-dim); color: var(--orange); }
    .sidebar-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto; background: var(--orange); color: #fff;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
      border-radius: 9px; padding: 0 4px; display: flex; align-items: center; justify-content: center;
    }
    .sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); }
    .btn-logout {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-logout:hover { border-color: #ff4444; color: #ff4444; }

    /* MAIN */
    #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 100vh; }
    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 24px; }
    .tab-content.active { display: block; }

    /* TOP BAR */
    .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .topbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
    .count-badge { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 2px 8px; border-radius: 12px; }
    .ml-auto { margin-left: auto; }
    .btn-add {
      background: var(--orange); color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      transition: opacity 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-add:hover { opacity: 0.85; }

    /* SEARCH */
    .search-bar {
      width: 100%; max-width: 320px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 14px; color: #fff; font-size: 14px; outline: none;
      transition: border-color 0.2s; margin-bottom: 16px;
    }
    .search-bar:focus { border-color: var(--orange); }
    .search-bar::placeholder { color: var(--text-dim); }

    /* FORM PANEL */
    #add-form-panel {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none;
    }
    #add-form-panel.open { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .form-input {
      background: var(--surface3); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 12px; color: #fff; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--orange); }
    .form-input::placeholder { color: var(--text-dim); }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); padding: 9px 18px; border-radius: 7px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { color: #fff; }
    .btn-save { background: var(--orange); color: #fff; border: none; padding: 9px 20px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* TOGGLE SWITCH */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; display: inline-block; width: 38px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--surface3); border: 1px solid var(--border); border-radius: 22px; transition: 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: var(--text-muted); border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: rgba(255,128,0,0.3); border-color: var(--orange); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--orange); }
    .toggle-label { font-size: 13px; color: var(--text-muted); }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      background: var(--surface2); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; font-size: 14px; vertical-align: middle; }
    .td-name { font-weight: 600; max-width: 180px; }
    .td-name .edit-input { width: 100%; }
    .badge-disponible { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
    .badge-agotado { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
    .action-btn { padding: 5px 8px; border-radius: 6px; font-size: 16px; transition: background 0.15s; }
    .action-btn:hover { background: var(--surface3); }
    .action-btn.danger:hover { background: rgba(239,68,68,0.15); color: #ef4444; }
    .action-btn.success:hover { background: rgba(34,197,94,0.15); color: #22c55e; }
    .edit-input {
      background: var(--surface3); border: 1px solid var(--orange);
      border-radius: 6px; padding: 5px 8px; color: #fff; font-size: 13px; outline: none; width: 100%;
    }
    .edit-select {
      background: var(--surface3); border: 1px solid var(--orange);
      border-radius: 6px; padding: 5px 8px; color: #fff; font-size: 13px; outline: none;
    }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .page-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
      padding: 6px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--text-muted); }

    /* ORDERS */
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .order-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .order-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .order-id { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--orange); }
    .status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
    .status-pendiente { background: rgba(255,128,0,0.15); color: var(--orange); border: 1px solid rgba(255,128,0,0.3); }
    .status-preparando { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
    .status-enviado { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
    .status-entregado { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status-cancelado { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .order-client { font-weight: 600; font-size: 15px; }
    .order-meta { color: var(--text-muted); font-size: 12px; line-height: 1.6; }
    .order-items { display: flex; flex-wrap: wrap; gap: 5px; max-height: 72px; overflow-y: auto; }
    .item-chip { background: var(--surface3); border: 1px solid var(--border); font-size: 11px; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
    .order-total { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--orange); }
    .order-footer { display: flex; align-items: center; gap: 8px; }
    .status-select {
      flex: 1; background: var(--surface3); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 10px; color: #fff; font-size: 13px; outline: none;
      cursor: pointer; transition: border-color 0.2s;
    }
    .status-select:focus { border-color: var(--orange); }
    .btn-del-order {
      width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border);
      background: none; color: var(--text-dim); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-del-order:hover { border-color: #ef4444; color: #ef4444; }
    .empty-orders { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-orders-icon { font-size: 56px; margin-bottom: 14px; }
    .empty-orders-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: #fff; margin-bottom: 6px; }

    /* MOBILE SIDEBAR → TOP TABS */
    @media (max-width: 767px) {
      #dashboard.visible { flex-direction: column; }
      #sidebar { width: 100%; min-height: auto; height: auto; flex-direction: row; position: static; border-right: none; border-bottom: 1px solid var(--border); align-items: center; padding: 0; }
      .sidebar-logo-wrap { display: none; }
      .sidebar-nav { flex-direction: row; padding: 0; gap: 0; flex: 1; }
      .sidebar-btn { flex-direction: row; border-radius: 0; padding: 14px 12px; justify-content: center; }
      .sidebar-btn.active { background: none; border-bottom: 2px solid var(--orange); }
      .sidebar-btn svg { display: none; }
      .sidebar-bottom { padding: 8px; border-top: none; border-left: 1px solid var(--border); }
      .btn-logout { padding: 8px 10px; justify-content: center; font-size: 12px; }
      .btn-logout span { display: none; }
      #main-content { min-height: auto; }
      .tab-content { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <img src="../encco-logo.png" alt="ENCCO" class="login-logo" />
      <h1 class="login-title">Panel Administrativo</h1>
      <p class="login-sub">Ingresa tus credenciales para continuar</p>
      <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
      <div class="login-field">
        <label class="login-label" for="login-user">Usuario</label>
        <input class="login-input" type="text" id="login-user" placeholder="encco.admin" autocomplete="username" />
      </div>
      <div class="login-field">
        <label class="login-label" for="login-pass">Contraseña</label>
        <div class="pw-wrap">
          <input class="login-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
          <button class="pw-toggle" onclick="togglePw()" title="Mostrar/ocultar">👁</button>
        </div>
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <!-- SIDEBAR -->
    <nav id="sidebar">
      <div class="sidebar-logo-wrap">
        <img src="../encco-logo.png" alt="ENCCO" class="sidebar-logo" />
      </div>
      <div class="sidebar-nav">
        <button class="sidebar-btn active" id="sb-productos" onclick="switchTab('productos')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Productos
        </button>
        <button class="sidebar-btn" id="sb-pedidos" onclick="switchTab('pedidos')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Pedidos
          <span class="sidebar-badge" id="pending-badge" style="display:none;">0</span>
        </button>
      </div>
      <div class="sidebar-bottom">
        <button class="btn-logout" onclick="doLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </nav>

    <!-- MAIN -->
    <div id="main-content">

      <!-- PRODUCTOS TAB -->
      <div class="tab-content active" id="tab-productos">
        <div class="topbar">
          <span class="topbar-title">Productos</span>
          <span class="count-badge" id="prod-count">0</span>
          <div class="ml-auto">
            <button class="btn-add" onclick="toggleAddForm()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Agregar
            </button>
          </div>
        </div>

        <!-- ADD FORM -->
        <div id="add-form-panel">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Nombre</label>
              <input class="form-input" type="text" id="np-nombre" placeholder="Nombre del producto" />
            </div>
            <div class="form-group">
              <label class="form-label">Categoría</label>
              <input class="form-input" type="text" id="np-categoria" placeholder="Ej: Bebidas, Snacks..." />
            </div>
            <div class="form-group">
              <label class="form-label">Precio ($)</label>
              <input class="form-input" type="number" id="np-precio" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="form-group">
              <label class="form-label">Descripción</label>
              <input class="form-input" type="text" id="np-descripcion" placeholder="Descripción breve (opcional)" />
            </div>
          </div>
          <div style="margin-top:12px;display:flex;gap:24px;flex-wrap:wrap;">
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" id="np-disponible" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">Disponible</span>
            </div>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" id="np-destacado" />
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">Destacado</span>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-cancel" onclick="toggleAddForm()">Cancelar</button>
            <button class="btn-save" id="btn-save-prod" onclick="saveNewProduct()">Guardar</button>
          </div>
        </div>

        <input class="search-bar" type="text" id="prod-search" placeholder="Buscar productos..." oninput="filterProductsTable()" />

        <div class="table-wrap">
          <table id="products-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Disponible</th>
                <th>Destacado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="prod-pagination"></div>
      </div>

      <!-- PEDIDOS TAB -->
      <div class="tab-content" id="tab-pedidos">
        <div class="topbar">
          <span class="topbar-title">Pedidos</span>
          <span class="count-badge" id="orders-count">0</span>
        </div>
        <div id="orders-container">
          <div class="empty-orders">
            <div class="empty-orders-icon">📦</div>
            <div class="empty-orders-title">Cargando pedidos...</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    // FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCPfZ_wqHALFF4bLS5UfX8tr5jmM1QYK8c",
      authDomain: "encco-925e1.firebaseapp.com",
      projectId: "encco-925e1",
      storageBucket: "encco-925e1.firebasestorage.app",
      messagingSenderId: "15019634613",
      appId: "1:15019634513:web:83a54c4b5b655b050933fc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // CREDENTIALS
    const ADMIN_USER = 'enccoadmin';
    const ADMIN_PASS = 'Quasar123.';

    // STATE
    let allProducts = [];
    let allOrders = [];
    let prodPage = 0;
    const PAGE_SIZE = 50;
    let editingRow = null;
    let unsubProd = null, unsubOrders = null;

    // CHECK SESSION
    if (sessionStorage.getItem('encco_admin_session') === 'true') {
      showDashboard();
    }

    // LOGIN
    function togglePw() {
      const inp = document.getElementById('login-pass');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      setTimeout(() => {
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
          sessionStorage.setItem('encco_admin_session', 'true');
          showDashboard();
        } else {
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      }, 600);
    }

    function doLogout() {
      sessionStorage.removeItem('encco_admin_session');
      if (unsubProd) { unsubProd(); unsubProd = null; }
      if (unsubOrders) { unsubOrders(); unsubOrders = null; }
      document.getElementById('dashboard').classList.remove('visible');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('login-pass').value = '';
      document.getElementById('login-user').value = '';
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      document.getElementById('dashboard').classList.add('visible');
      startListeners();
    }

    // TABS
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('sb-' + tab).classList.add('active');
    }

    // FIRESTORE LISTENERS
    function startListeners() {
      if (!unsubProd) {
        unsubProd = db.collection('productos').onSnapshot(snap => {
          allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          allProducts.sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''));
          renderProductsTable();
        });
      }
      if (!unsubOrders) {
        unsubOrders = db.collection('pedidos').orderBy('creadoEn', 'desc').onSnapshot(snap => {
          allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderOrders();
          const pending = allOrders.filter(o => o.estado === 'pendiente').length;
          const badge = document.getElementById('pending-badge');
          badge.textContent = pending;
          badge.style.display = pending > 0 ? 'flex' : 'none';
          document.getElementById('orders-count').textContent = allOrders.length;
        });
      }
    }

    // PRODUCTS
    function filterProductsTable() { prodPage = 0; renderProductsTable(); }

    function getFilteredProducts() {
      const q = (document.getElementById('prod-search').value || '').trim().toLowerCase();
      if (!q) return allProducts;
      return allProducts.filter(p =>
        (p.nombre||'').toLowerCase().includes(q) ||
        (p.categoria||'').toLowerCase().includes(q)
      );
    }

    function renderProductsTable() {
      const filtered = getFilteredProducts();
      const total = filtered.length;
      document.getElementById('prod-count').textContent = total;
      const startIdx = prodPage * PAGE_SIZE;
      const page = filtered.slice(startIdx, startIdx + PAGE_SIZE);
      const tbody = document.getElementById('products-tbody');
      if (page.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted);">Sin productos</td></tr>`;
        renderPagination(total);
        return;
      }
      tbody.innerHTML = page.map(p => renderProductRow(p)).join('');
      renderPagination(total);
    }

    function renderProductRow(p) {
      const price = Number(p.precio || 0).toFixed(2);
      const disp = p.disponible !== false;
      const dest = p.destacado === true;
      return `<tr id="row-${p.id}">
        <td class="td-name">${esc(p.nombre)}</td>
        <td>${esc(p.categoria)}</td>
        <td>$${price}</td>
        <td><span class="${disp?'badge-disponible':'badge-agotado'}">${disp?'Disponible':'Agotado'}</span></td>
        <td>
          <button onclick="toggleDestacado('${p.id}',${dest})" title="${dest?'Quitar destacado':'Marcar como destacado'}" style="background:${dest?'rgba(255,128,0,0.15)':'transparent'};border:1px solid ${dest?'rgba(255,128,0,0.4)':'var(--border)'};color:${dest?'var(--orange)':'var(--text-dim)'};border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;">
            ${dest?'★ Sí':'☆ No'}
          </button>
        </td>
        <td style="white-space:nowrap;">
          <button class="action-btn" onclick="startEdit('${p.id}')" title="Editar">✏️</button>
          <button class="action-btn danger" onclick="deleteProduct('${p.id}','${esc(p.nombre)}')" title="Eliminar">🗑️</button>
        </td>
      </tr>`;
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / PAGE_SIZE);
      const container = document.getElementById('prod-pagination');
      if (pages <= 1) { container.innerHTML = ''; return; }
      container.innerHTML = `
        <button class="page-btn" onclick="changePage(-1)" ${prodPage === 0 ? 'disabled' : ''}>← Anterior</button>
        <span class="page-info">Página ${prodPage + 1} de ${pages}</span>
        <button class="page-btn" onclick="changePage(1)" ${prodPage >= pages - 1 ? 'disabled' : ''}>Siguiente →</button>
      `;
    }
    function changePage(delta) { prodPage += delta; renderProductsTable(); }

    // ADD FORM
    function toggleAddForm() {
      const panel = document.getElementById('add-form-panel');
      panel.classList.toggle('open');
      if (!panel.classList.contains('open')) {
        ['np-nombre','np-categoria','np-precio','np-descripcion'].forEach(id => { document.getElementById(id).value = ''; });
        document.getElementById('np-disponible').checked = true;
      }
    }

    async function saveNewProduct() {
      const nombre = document.getElementById('np-nombre').value.trim();
      const categoria = document.getElementById('np-categoria').value.trim();
      const precio = parseFloat(document.getElementById('np-precio').value) || 0;
      const descripcion = document.getElementById('np-descripcion').value.trim();
      const disponible = document.getElementById('np-disponible').checked;
      if (!nombre || !categoria) { alert('Nombre y categoría son requeridos'); return; }
      const btn = document.getElementById('btn-save-prod');
      btn.disabled = true; btn.textContent = 'Guardando...';
      try {
        const destacado = document.getElementById('np-destacado').checked;
        await db.collection('productos').add({ nombre, categoria, precio, descripcion, disponible, destacado });
        toggleAddForm();
      } catch(e) { alert('Error al guardar: ' + e.message); }
      btn.disabled = false; btn.textContent = 'Guardar';
    }

    // INLINE EDIT
    function startEdit(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      const row = document.getElementById('row-' + id);
      if (!row) return;
      const price = Number(p.precio || 0).toFixed(2);
      const disp = p.disponible !== false;
      const dest = p.destacado === true;
      row.innerHTML = `
        <td><input class="edit-input" id="e-nombre-${id}" value="${esc(p.nombre)}" /></td>
        <td><input class="edit-input" id="e-cat-${id}" value="${esc(p.categoria)}" /></td>
        <td><input class="edit-input" id="e-precio-${id}" type="number" value="${price}" min="0" step="0.01" style="width:80px;" /></td>
        <td>
          <select class="edit-select" id="e-disp-${id}">
            <option value="true" ${disp?'selected':''}>Disponible</option>
            <option value="false" ${!disp?'selected':''}>Agotado</option>
          </select>
        </td>
        <td style="white-space:nowrap;">
          <button class="action-btn success" onclick="confirmEdit('${id}')" title="Guardar">✓</button>
          <button class="action-btn" onclick="cancelEdit('${id}')" title="Cancelar">✗</button>
        </td>`;
    }

    async function confirmEdit(id) {
      const nombre = document.getElementById(`e-nombre-${id}`).value.trim();
      const categoria = document.getElementById(`e-cat-${id}`).value.trim();
      const precio = parseFloat(document.getElementById(`e-precio-${id}`).value) || 0;
      const disponible = document.getElementById(`e-disp-${id}`).value === 'true';
      const destacado = document.getElementById(`e-dest-${id}`).checked;
      if (!nombre || !categoria) { alert('Nombre y categoría requeridos'); return; }
      try {
        await db.collection('productos').doc(id).update({ nombre, categoria, precio, disponible, destacado });
      } catch(e) { alert('Error: ' + e.message); }
    }

    function cancelEdit(id) { renderProductsTable(); }

    async function toggleDestacado(id, current) {
      try { await db.collection('productos').doc(id).update({ destacado: !current }); } catch(e) { alert('Error: ' + e.message); }
    }

    async function deleteProduct(id, nombre) {
      if (!confirm(`¿Eliminar "${nombre}"?`)) return;
      try { await db.collection('productos').doc(id).delete(); } catch(e) { alert('Error: ' + e.message); }
    }

    // ORDERS
    function renderOrders() {
      const container = document.getElementById('orders-container');
      if (allOrders.length === 0) {
        container.innerHTML = `<div class="empty-orders"><div class="empty-orders-icon">📦</div><div class="empty-orders-title">No hay pedidos aún</div><p>Los pedidos aparecerán aquí en tiempo real</p></div>`;
        return;
      }
      container.innerHTML = `<div class="orders-grid">${allOrders.map(o => renderOrderCard(o)).join('')}</div>`;
    }

    function renderOrderCard(o) {
      const shortId = (o.id || '').slice(-6).toUpperCase();
      const items = Array.isArray(o.items) ? o.items : [];
      const total = Number(o.total || 0).toFixed(2);
      const estado = o.estado || 'pendiente';
      const statuses = ['pendiente','preparando','enviado','entregado','cancelado'];
      const selectOpts = statuses.map(s => `<option value="${s}" ${estado===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');
      const chipsHtml = items.map(i => `<span class="item-chip">${esc(i.nombre)} ×${i.cantidad}</span>`).join('');
      return `<div class="order-card" id="ocard-${o.id}">
        <div class="order-card-top">
          <span class="order-id">#${shortId}</span>
          <span class="status-badge status-${estado}">${estado.charAt(0).toUpperCase()+estado.slice(1)}</span>
        </div>
        <div class="order-client">${esc(o.nombre)}</div>
        <div class="order-meta">📞 ${esc(o.telefono)}<br/>📍 ${esc(o.direccion)}${o.nota?`<br/>📝 ${esc(o.nota)}`:''}</div>
        ${chipsHtml ? `<div class="order-items">${chipsHtml}</div>` : ''}
        <div class="order-total">$${total}</div>
        <div class="order-footer">
          <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">${selectOpts}</select>
          <button class="btn-del-order" onclick="deleteOrder('${o.id}')" title="Eliminar">🗑️</button>
        </div>
      </div>`;
    }

    async function updateOrderStatus(id, newStatus) {
      try { await db.collection('pedidos').doc(id).update({ estado: newStatus }); } catch(e) { alert('Error: ' + e.message); }
    }

    async function deleteOrder(id) {
      if (!confirm('¿Eliminar este pedido?')) return;
      try { await db.collection('pedidos').doc(id).delete(); } catch(e) { alert('Error: ' + e.message); }
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
