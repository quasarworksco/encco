<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo negro -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Grid sutil -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,128,0,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,128,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Línea naranja top -->
  <rect x="0" y="0" width="1200" height="3" fill="#ff8000"/>

  <!-- Rayo naranja (logo icon solo) -->
  <g transform="translate(300, 165) scale(2.8)">
    <polygon points="24,6 4,60 22,60 6,114 46,52 26,52 44,6" fill="#ff8000"/>
    <polygon points="46,18 28,64 44,64 30,110 64,56 48,56 62,18" fill="#ff8000"/>
    <polygon points="30,22 18,58 28,58 20,90 44,52 32,52 42,22" fill="#0a0a0a"/>
  </g>

  <!-- ENCCO texto -->
  <text x="610" y="290" font-family="'Arial Black', Impact, sans-serif" font-size="130" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">ENCCO</text>

  <!-- Línea naranja decorativa -->
  <rect x="310" y="315" width="580" height="3" fill="#ff8000" rx="2"/>

  <!-- Tagline -->
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="26" font-weight="300" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="4">NOS ENCARGAMOS DE TODO · TÚ SOLO DISFRUTA</text>

  <!-- Badge delivery -->
  <rect x="450" y="415" width="300" height="44" rx="22" fill="rgba(255,128,0,0.12)" stroke="rgba(255,128,0,0.35)" stroke-width="1"/>
  <text x="600" y="443" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ff8000" text-anchor="middle" letter-spacing="2">⚡ DELIVERY EXPRESS · MARACAIBO</text>

  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">encco.dgp-link.com</text>

  <!-- Línea naranja bottom -->
  <rect x="0" y="627" width="1200" height="3" fill="#ff8000"/>
</svg>
